name: CI SkillLink

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation dépendances frontend
        run: npm ci
        working-directory: frontend

      - name: Build React
        run: npm run build
        working-directory: frontend

      - name: Lint ESLint
        run: npm run lint
        working-directory: frontend

      - name: Tests Vitest
        run: npm run test -- --reporter=verbose
        working-directory: frontend

  backend-tests:
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: skilllink_test
          MYSQL_USER: skilllink
          MYSQL_PASSWORD: skilllink
          MYSQL_ROOT_PASSWORD: rootsecret
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql

      - name: Créer le fichier .env
        run: |
          cat > backend/.env << 'EOF'
          APP_ENV=test
          APP_SECRET=testsecret
          APP_SHARE_DIR=var/share
          DEFAULT_URI=http://localhost
          DATABASE_URL=mysql://skilllink:skilllink@127.0.0.1:3306/skilllink_test
          MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0
          MAILER_DSN=null://null
          CORS_ALLOW_ORIGIN='^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
          EOF

      - name: Installation dependances Composer
        run: composer install --no-interaction
        working-directory: backend

      - name: Créer la base de test
        run: php bin/console doctrine:database:create --env=test --if-not-exists
        working-directory: backend
        env:
          DATABASE_URL: 'mysql://skilllink:skilllink@127.0.0.1:3306/skilllink_test'

      - name: Migrations
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction
        working-directory: backend
        env:
          DATABASE_URL: 'mysql://skilllink:skilllink@127.0.0.1:3306/skilllink_test'

      - name: Tests PHPUnit
        run: php bin/phpunit
        working-directory: backend
        env:
          DATABASE_URL: 'mysql://skilllink:skilllink@127.0.0.1:3306/skilllink_test'
          APP_ENV: test

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql

      - name: Créer le fichier .env
        run: |
          cat > backend/.env << 'EOF'
          APP_ENV=dev
          APP_SECRET=testsecret
          APP_SHARE_DIR=var/share
          DEFAULT_URI=http://localhost
          DATABASE_URL=mysql://skilllink:skilllink@127.0.0.1:3306/skilllink
          MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0
          MAILER_DSN=null://null
          CORS_ALLOW_ORIGIN='^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
          EOF

      - name: Installation dépendances Composer
        run: composer install --no-interaction
        working-directory: backend

      - name: Debug vendor
        run: ls vendor/bin/
        working-directory: backend

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src/ --error-format=github
        working-directory: backend