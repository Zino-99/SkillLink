nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['^http://localhost:\d+$']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        allow_credentials: true
        max_age: 3600
    paths:
        '^/api/':
            allow_origin: ['^http://localhost:\d+$']
            allow_credentials: true
            allow_headers: ['Content-Type']
            allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
            max_age: 3600